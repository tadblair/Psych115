name: Deploy neurorest-simulator to GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - "neurorest-simulator/**"
      - ".github/workflows/deploy-neurorest.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-neurorest"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: neurorest-simulator/package-lock.json

      - name: Verify files
        run: |
          ls -la
          ls -la neurorest-simulator
          test -f neurorest-simulator/package-lock.json

      - name: Install dependencies
        working-directory: neurorest-simulator
        run: npm ci

      - name: Build
        working-directory: neurorest-simulator
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: neurorest-simulator/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4