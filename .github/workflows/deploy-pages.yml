name: Deploy both simulators to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            neurorest-simulator/package-lock.json
            synaptic-integration/package-lock.json

      - name: Build neurorest
        working-directory: ./neurorest-simulator
        run: |
          npm ci
          npm run build

      - name: Build synaptic integration
        working-directory: ./synaptic-integration
        run: |
          npm ci
          npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p site/neurorest-simulator
          mkdir -p site/synapticintegration-simulator

          cp -r neurorest-simulator/dist/* site/neurorest-simulator/
          cp -r synaptic-integration/dist/* site/synapticintegration-simulator/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4